name: CI - Pull Request & Branch Validation

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Linting
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,scss}"

      - name: Production build
        run: npm run build
